<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EBLG Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- Style -->
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- PolylineDecorator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.polylinedecorator/1.7.0/leaflet.polylineDecorator.min.js"></script>
</head>

<body>

    <div id="app-container">
        <!-- SIDEBAR -->
        <div id="sidebar" class="glass sidebar-expanded">
            <div id="sidebar-header">
                <h2>EBLG Dashboard</h2>
                <button id="sidebar-toggle">☰</button>
            </div>

            <div class="sb-section glass">
                <h3>METAR</h3>
                <div id="metar"></div>
            </div>

            <div class="sb-section glass">
                <h3>TAF</h3>
                <div id="taf"></div>
            </div>

            <div class="sb-section glass">
                <h3>Piste active</h3>
                <div id="runway-panel"></div>
            </div>

            <div class="sb-section glass">
                <h3>État des services</h3>
                <div id="status-panel"></div>
            </div>

            <div id="sono-panel" class="glass collapsed">
                <div id="sono-header">
                    <span>Sonomètres</span>
                    <button id="sono-toggle">⯈</button>
                </div>

                <div id="sono-stats"></div>
                <canvas id="sono-chart" width="220" height="60"></canvas>
                <div id="sono-list"></div>
            </div>

            <div class="sb-section glass">
                <h3>FIDS</h3>
                <div id="fids"></div>
            </div>

            <button id="reset-map" class="glass">Reset carte</button>
        </div>

        <!-- CONTENU PRINCIPAL -->
        <div id="main">
            <h2>Carte</h2>
            <div id="map"></div>
        </div>
    </div>

    <!-- Script principal -->
    <script src="app.js?v=61"></script>

</body>
</html>
